name: Release Weavz CLI

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build and validate without publishing
        required: true
        default: true
        type: boolean
      npm_tag:
        description: npm dist-tag to publish
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
      confirm_release:
        description: Type release-weavz-cli to publish
        required: false
        type: string

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: weavz-cli-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Release @weavz-io/cli
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm-release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use current npm
        run: |
          npm install -g npm@latest
          node --version
          npm --version

      - name: Validate release request
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "CLI releases must run from main. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

          if [ "$DRY_RUN" = "false" ] && [ "$CONFIRM_RELEASE" != "release-weavz-cli" ]; then
            echo "Real release requires confirm_release=release-weavz-cli"
            exit 1
          fi

          case "$NPM_TAG" in
            latest|next) ;;
            *)
              echo "Unsupported npm tag: ${NPM_TAG}"
              exit 1
              ;;
          esac
        env:
          CONFIRM_RELEASE: ${{ inputs.confirm_release }}
          DRY_RUN: ${{ inputs.dry_run }}
          NPM_TAG: ${{ inputs.npm_tag }}

      - name: Validate package
        id: package
        run: |
          test -f dist/cli.mjs
          node dist/cli.mjs --help
          version="$(node -p "require('./package.json').version")"
          actual="$(node dist/cli.mjs --version)"
          if [ "$actual" != "$version" ]; then
            echo "CLI version ${actual} does not match package version ${version}"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          if npm view "@weavz-io/cli@${version}" version >/dev/null 2>&1; then
            if [ "$DRY_RUN" = "false" ]; then
              echo "@weavz-io/cli@${version} is already published. Bump package.json before publishing a new release."
              exit 1
            fi
            echo "@weavz-io/cli@${version} is already published; dry-run validation will continue"
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

          pack_json="$(npm pack --dry-run --json)"
          PACK_JSON="$pack_json" node <<'NODE'
          const pack = JSON.parse(process.env.PACK_JSON || '[]')[0]
          const actual = new Set((pack?.files || []).map(file => file.path))
          const allowed = new Set([
            'LICENSE',
            'README.md',
            'dist/cli.mjs',
            'package.json',
          ])
          for (const file of actual) {
            if (!allowed.has(file)) {
              console.error(`Unexpected packed file ${file}`)
              process.exit(1)
            }
          }
          for (const file of allowed) {
            if (!actual.has(file)) {
              console.error(`Missing packed file ${file}`)
              process.exit(1)
            }
          }
          NODE

          pack_file="$(npm pack --json | node -e "let data='';process.stdin.on('data',c=>data+=c);process.stdin.on('end',()=>{const pack=JSON.parse(data)[0];process.stdout.write(pack.filename)})")"
          install_dir="$(mktemp -d)"
          package_root="$PWD"
          pushd "$install_dir" >/dev/null
          npm init -y >/dev/null
          npm install "$package_root/$pack_file" >/dev/null
          bin_actual="$(./node_modules/.bin/weavz --version)"
          if [ "$bin_actual" != "$version" ]; then
            echo "Installed weavz bin version ${bin_actual} does not match package version ${version}"
            exit 1
          fi
          popd >/dev/null
          rm -rf "$install_dir" "$pack_file"

          if grep -RInE 'X-Service-Key|service credentials|BetterAuth|QuickJS|Cloudflare|Wrangler|Drizzle|BullMQ|DATABASE_URL|SERVICE_KEY' README.md package.json dist LICENSE >/tmp/weavz-cli-release-denylist; then
            echo "Public CLI package contains denied internal terms."
            cat /tmp/weavz-cli-release-denylist
            exit 1
          fi
        env:
          DRY_RUN: ${{ inputs.dry_run }}

      - name: Publish to npm
        if: inputs.dry_run == false
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm publish --access public --provenance --tag "$NPM_TAG"
          else
            echo "NPM_TOKEN is not set; attempting npm Trusted Publishing via GitHub OIDC"
            npm publish --access public --provenance --tag "$NPM_TAG"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ inputs.npm_tag }}

      - name: Tag release
        if: inputs.dry_run == false
        run: |
          tag="v${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            existing="$(git rev-parse "$tag")"
            current="$(git rev-parse HEAD)"
            if [ "$existing" != "$current" ]; then
              echo "Git tag ${tag} already exists at ${existing}, not current commit ${current}"
              exit 1
            fi
            echo "Git tag ${tag} already exists on this commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"
        env:
          VERSION: ${{ steps.package.outputs.version }}

      - name: Create GitHub release
        if: inputs.dry_run == false
        run: |
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "GitHub release v${VERSION} already exists"
            exit 0
          fi
          gh release create "v${VERSION}" \
            --title "@weavz-io/cli v${VERSION}" \
            --notes "Published @weavz-io/cli@${VERSION} to npm."
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.package.outputs.version }}
